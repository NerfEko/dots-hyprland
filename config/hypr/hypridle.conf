$lock_cmd = hyprctl dispatch global quickshell:lock & pidof qs quickshell hyprlock || hyprlock
# $lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = /home/eko/.config/hypr/oled-dpms.sh on
    inhibit_sleep = 3
}

# OLED Monitor Safe Configuration using wlopm

listener {
    timeout = 1200 # 20mins
    on-timeout = loginctl lock-session
}

# Use custom OLED-safe DPMS script
listener {
    timeout = 1500 # 25mins
    on-timeout = /home/eko/.config/hypr/oled-dpms.sh off
    on-resume = /home/eko/.config/hypr/oled-dpms.sh on
}

# Disabled suspend - never sleep to keep background operations running
