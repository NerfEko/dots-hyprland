# QuickShell Performance Optimizations
misc {
    # Reduce compositor overhead for layers
    layers_hog_keyboard_focus = false
    new_window_takes_over_fullscreen = 2
    
    # Better performance
    render_ahead_of_time = false
    allow_session_lock_restore = false
}

# Optimized window rules for QuickShell
windowrulev2 = noblur, class:^(quickshell)$
windowrulev2 = noshadow, class:^(quickshell)$
windowrulev2 = noanim, class:^(quickshell)$, floating:1
windowrulev2 = immediate, class:^(quickshell)$

# Layer rules for better QuickShell performance  
layerrule = noanim, quickshell
layerrule = blur, quickshell
layerrule = ignorezero, quickshell