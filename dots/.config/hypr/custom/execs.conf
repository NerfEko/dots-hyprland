# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Start wayland-idle-inhibitor.py by default to keep screen awake
exec-once = ${HOME}/.config/ags/scripts/wayland-idle-inhibitor.py

# OpenCode headless server for AI sidebar integration
exec-once = opencode serve --port 4096 --hostname 127.0.0.1
